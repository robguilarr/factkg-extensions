dataset: "FactKG"
llm_model: "gpt-4o-mini"

# QGR Fingerprint Verification Configuration
qgr_fingerprint:
  enabled: true
  codebook_size: 512
  code_length: 16
  embedding_dim: 256
  commitment_beta: 0.25
  ema_decay: 0.99
  # Verification thresholds
  support_threshold: 0.5
  refute_threshold: 0.2
  use_weighted_alignment: true
  # Incremental update settings
  incremental_update: true
  cache_entity_embeddings: true
